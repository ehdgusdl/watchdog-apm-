# Grafana — ClickHouse 데이터 시각화. 개발용, 영속성 없음(emptyDir).
#   web 3000 -> host localhost:3000  (기본 계정 admin / admin)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: watchdog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            # ClickHouse 데이터소스 플러그인 자동 설치
            - name: GF_INSTALL_PLUGINS
              value: grafana-clickhouse-datasource
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: watchdog
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      nodePort: 30300
