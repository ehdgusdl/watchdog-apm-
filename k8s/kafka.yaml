# Kafka (KRaft, 단일 노드) — 개발용. 영속성 없음(emptyDir).
# 리스너 2개:
#   INTERNAL(9094)  : 클러스터 내부용 (OTel Collector 등) -> kafka.watchdog.svc.cluster.local:9094
#   EXTERNAL(9092)  : 호스트용 (localhost:9092), NodePort 30092 로 노출
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: watchdog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092  # EXTERNAL
            - containerPort: 9094  # INTERNAL
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_LISTENERS
              value: "CONTROLLER://:9093,INTERNAL://:9094,EXTERNAL://:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "INTERNAL://kafka.watchdog.svc.cluster.local:9094,EXTERNAL://localhost:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "INTERNAL"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
# 클러스터 내부용 (INTERNAL 리스너)
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: watchdog
spec:
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9094
      targetPort: 9094
---
# 호스트용 (EXTERNAL 리스너, NodePort -> kind -> localhost:9092)
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: watchdog
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    - name: external
      port: 9092
      targetPort: 9092
      nodePort: 30092
