# kind 로컬 클러스터 정의 — 호스트에서 실행되는 Spring 서비스가
# 클러스터 안 인프라(Kafka/ClickHouse/Grafana/OTel)에 접근할 수 있도록
# NodePort 를 호스트 포트로 매핑한다.
#
#   생성:  kind create cluster --config k8s/kind-cluster.yaml
#   삭제:  kind delete cluster --name watchdog
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: watchdog
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30092   # Kafka (EXTERNAL)      -> host localhost:9092
        hostPort: 9092
        protocol: TCP
      - containerPort: 30300   # Grafana               -> host localhost:3000
        hostPort: 3000
        protocol: TCP
      - containerPort: 30123   # ClickHouse HTTP       -> host localhost:8123
        hostPort: 8123
        protocol: TCP
      - containerPort: 30900   # ClickHouse native     -> host localhost:9000
        hostPort: 9000
        protocol: TCP
      - containerPort: 30317   # OTel Collector gRPC   -> host localhost:4317
        hostPort: 4317
        protocol: TCP
      - containerPort: 30318   # OTel Collector HTTP   -> host localhost:4318
        hostPort: 4318
        protocol: TCP
